<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCAA Schedule</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
    color: white; padding: 14px 26px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.4px; }
  .header-spacer { flex: 1; }
  .app-layout { display: flex; min-height: calc(100vh - 57px); }
  .sidebar {
    width: 288px; min-width: 268px; background: white;
    border-right: 1px solid #e2e8f0; padding: 18px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 2px 0 6px rgba(0,0,0,0.05);
  }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .calendar-header .month-year { font-weight: 700; font-size: 0.93rem; color: #1e3a5f; }
  .cal-nav-btn {
    background: none; border: 1px solid #cbd5e0; border-radius: 6px;
    cursor: pointer; padding: 3px 9px; font-size: 1rem; color: #4a5568; transition: all 0.15s;
  }
  .cal-nav-btn:hover { background: #ebf4ff; border-color: #2d6a9f; color: #2d6a9f; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 0.64rem; font-weight: 600; color: #718096; padding: 3px 0; text-transform: uppercase; }
  .cal-day {
    text-align: center; padding: 5px 1px; border-radius: 5px; font-size: 0.79rem;
    cursor: pointer; transition: all 0.15s; border: 1px solid transparent; color: #4a5568; line-height: 1;
  }
  .cal-day:hover:not(.cal-empty):not(.cal-no-data) { background: #ebf4ff; border-color: #2d6a9f; }
  .cal-day.cal-empty { cursor: default; }
  .cal-day.cal-no-data { color: #cbd5e0; cursor: default; }
  .cal-day.cal-has-data { color: #1a202c; font-weight: 500; }
  .cal-day.cal-today { background: #ebf4ff; border-color: #2d6a9f; color: #2d6a9f; font-weight: 700; }
  .cal-day.cal-selected { background: #1e3a5f !important; color: white !important; font-weight: 700; border-color: #1e3a5f; }
  .cal-day.cal-weekend.cal-has-data { color: #718096; }
  .today-btn {
    width: 100%; padding: 8px 0; background: #1e3a5f; color: white;
    border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: background 0.15s; letter-spacing: 0.3px;
  }
  .today-btn:hover { background: #2d6a9f; }
  .sidebar-section { border-top: 1px solid #e2e8f0; padding-top: 12px; }
  .sidebar-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.5px; color: #a0aec0; font-weight: 600; margin-bottom: 7px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; margin-bottom: 4px; color: #4a5568; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .main-content { flex: 1; padding: 22px 26px; overflow-y: auto; }
  .date-heading { font-size: 1.25rem; font-weight: 700; color: #1e3a5f; margin-bottom: 16px; }
  .state-card { background: white; border-radius: 12px; padding: 48px 32px; text-align: center; color: #718096; box-shadow: 0 1px 4px rgba(0,0,0,0.08); max-width: 520px; }
  .state-icon { font-size: 2.6rem; margin-bottom: 14px; }
  .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .schedule-grid .full-width { grid-column: 1 / -1; }
  .section-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
  .section-header { padding: 10px 14px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.8px; color: white; }
  .section-body { padding: 10px 14px; }
  .hdr-regions  { background: linear-gradient(90deg,#1e3a5f,#2d6a9f); }
  .hdr-eastgate { background: linear-gradient(90deg,#276749,#38a169); }
  .hdr-tria     { background: linear-gradient(90deg,#702459,#b83280); }
  .hdr-lakeview { background: linear-gradient(90deg,#744210,#d69e2e); }
  .hdr-admin    { background: linear-gradient(90deg,#44337a,#805ad5); }
  .hdr-vacation { background: linear-gradient(90deg,#2c5282,#4299e1); }
  .supervisor-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .supervisor-badge { display: flex; flex-direction: column; align-items: center; border-radius: 8px; padding: 7px 10px; flex: 1; min-width: 72px; }
  .supervisor-badge .role { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 3px; }
  .supervisor-badge .name { font-size: 0.83rem; font-weight: 700; }
  .supervisor-badge.first  { background: #fff5f5; border: 1px solid #feb2b2; }
  .supervisor-badge.first  .role { color: #e53e3e; }
  .supervisor-badge.first  .name { color: #c53030; }
  .supervisor-badge.second { background: #fffaf0; border: 1px solid #fbd38d; }
  .supervisor-badge.second .role { color: #d69e2e; }
  .supervisor-badge.second .name { color: #b7791f; }
  .supervisor-badge.third  { background: #f0fff4; border: 1px solid #9ae6b4; }
  .supervisor-badge.third  .role { color: #38a169; }
  .supervisor-badge.third  .name { color: #276749; }
  .staff-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.5px; color: #a0aec0; font-weight: 600; margin-bottom: 5px; }
  .staff-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
  .staff-chip { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 4px; text-align: center; font-size: 0.75rem; color: #2d3748; font-weight: 500; }
  .staff-chip.empty { color: #cbd5e0; font-style: italic; font-weight: 400; }
  .role-list { display: flex; flex-direction: column; gap: 5px; }
  .role-item { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: 6px; background: #f7fafc; }
  .role-item .role-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; min-width: 56px; color: #718096; }
  .role-item .role-name { font-size: 0.83rem; font-weight: 600; color: #2d3748; }
  .role-item .role-name.empty { color: #cbd5e0; font-style: italic; font-weight: 400; }
  .vac-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .vac-chip { background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 20px; padding: 3px 11px; font-size: 0.77rem; color: #2b6cb0; font-weight: 500; }
  .empty-section { color: #a0aec0; font-style: italic; font-size: 0.82rem; padding: 4px 0; }
  @media (max-width: 800px) {
    .app-layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid #e2e8f0; }
    .schedule-grid { grid-template-columns: 1fr; }
    .schedule-grid .full-width { grid-column: 1; }
  }

</style>
</head>
<body>
<header>
  <h1>&#128197; TCAA Schedule</h1>
  <div class="header-spacer"></div>
</header>
<div class="app-layout">
  <div class="sidebar">
    <button class="today-btn" onclick="goToToday()">&#128197; Today</button>
    <div>
      <div class="calendar-header">
        <button class="cal-nav-btn" onclick="prevMonth()">&#8249;</button>
        <span class="month-year" id="monthYearLabel"></span>
        <button class="cal-nav-btn" onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="calendar-grid" id="calGrid"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sections</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2d6a9f"></div>Regions</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38a169"></div>Eastgate</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b83280"></div>TRIA</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d69e2e"></div>Lakeview</div>
      <div class="legend-item"><div class="legend-dot" style="background:#805ad5"></div>Admin</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4299e1"></div>Vacation / Non-Clinical</div>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <div class="date-heading" id="dateHeading"></div>
    <div id="scheduleDisplay">
      <div class="state-card"><div class="state-icon">&#128197;</div><p>Loading&hellip;</p></div>
    </div>
  </div>
</div>

var viewYear  = new Date().getFullYear();
var viewMonth = new Date().getMonth();
var selectedDate = null;
var DOW    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function toIso(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function getToday(){ var t=new Date(); return toIso(t.getFullYear(),t.getMonth(),t.getDate()); }
function formatDateFull(iso){ var p=iso.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCalendar(){
  document.getElementById('monthYearLabel').textContent=MONTHS[viewMonth]+' '+viewYear;
  var grid=document.getElementById('calGrid');
  grid.innerHTML='';
  DOW.forEach(function(d){ var el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  var firstDay=new Date(viewYear,viewMonth,1).getDay();
  var daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  var today=getToday();
  for(var i=0;i<firstDay;i++){ var blank=document.createElement('div'); blank.className='cal-day cal-empty'; grid.appendChild(blank); }
  for(var d=1;d<=daysInMonth;d++){
    var iso=toIso(viewYear,viewMonth,d);
    var el=document.createElement('div');
    var dow=(firstDay+d-1)%7;
    var hasData=!!scheduleData[iso];
    var isWeekend=(dow===0||dow===6);
    var cls='cal-day';
    cls+=hasData?' cal-has-data':' cal-no-data';
    if(isWeekend) cls+=' cal-weekend';
    if(iso===today) cls+=' cal-today';
    if(iso===selectedDate) cls+=' cal-selected';
    el.className=cls; el.textContent=d;
    if(hasData){ (function(date){ el.onclick=function(){ selectDate(date); }; })(iso); el.title=formatDateFull(iso); }
    grid.appendChild(el);
  }
}

function goToToday(){
  var today=getToday();
  if(scheduleData[today]){ selectDate(today); return; }
  var keys=Object.keys(scheduleData).sort();
  var target=keys[0];
  for(var i=0;i<keys.length;i++){ if(keys[i]>=today){ target=keys[i]; break; } }
  selectDate(target);
}
function prevMonth(){ viewMonth--; if(viewMonth<0){ viewMonth=11; viewYear--; } renderCalendar(); }
function nextMonth(){ viewMonth++; if(viewMonth>11){ viewMonth=0; viewYear++; } renderCalendar(); }

function selectDate(iso){
  selectedDate=iso;
  var parts=iso.split('-').map(Number);
  viewYear=parts[0]; viewMonth=parts[1]-1;
  renderCalendar(); renderSchedule(iso);
}

function renderSchedule(iso){
  document.getElementById('dateHeading').textContent=formatDateFull(iso);
  var data=scheduleData[iso];
  var display=document.getElementById('scheduleDisplay');
  if(!data){ display.innerHTML='<div class="state-card"><div class="state-icon">&#128197;</div><p>No schedule data for this date.</p></div>'; return; }
  var html='<div class="schedule-grid">';
  var reg=data.regions;
  html+='<div class="section-card full-width"><div class="section-header hdr-regions">Regions</div><div class="section-body">';
  html+='<div class="supervisor-row">';
  html+=supBadge('First',reg.First,'first');
  html+=supBadge('Second',reg.Second,'second');
  html+=supBadge('Third / Days',reg.Third,'third');
  html+='</div>';
  html+='<div class="staff-label">Staff</div><div class="staff-grid">';
  for(var i=0;i<10;i++){
    var nm=(reg.staff&&reg.staff[i])?reg.staff[i].trim():'';
    html+=nm?'<div class="staff-chip">'+esc(nm)+'</div>':'<div class="staff-chip empty">&mdash;</div>';
  }
  html+='</div></div></div>';
  var eg=data.eastgate;
  html+='<div class="section-card"><div class="section-header hdr-eastgate">Eastgate</div><div class="section-body"><div class="role-list">';
  html+=roleRow('E1',eg.E1); html+=roleRow('E2',eg.E2); html+=roleRow('E3 / GI',eg.E3GI);
  html+='</div></div></div>';
  html+='<div class="section-card"><div class="section-header hdr-tria">TRIA</div><div class="section-body"><div class="role-list">';
  html+=roleRow('1',data.tria['1']);
  html+='</div></div></div>';
  var lk=data.lakeview;
  html+='<div class="section-card"><div class="section-header hdr-lakeview">Lakeview</div><div class="section-body"><div class="role-list">';
  html+=roleRow('Call',lk.Call); html+=roleRow('1',lk['1']); html+=roleRow('2',lk['2']); html+=roleRow('Post-Call',lk.PostCall);
  html+='</div></div></div>';
  var adm=data.admin;
  html+='<div class="section-card"><div class="section-header hdr-admin">Admin</div><div class="section-body"><div class="role-list">';
  html+=roleRow('1',adm['1']); html+=roleRow('2',adm['2']); html+=roleRow('3',adm['3']);
  html+='</div></div></div>';
  var vac=data.vacation;
  html+='<div class="section-card full-width"><div class="section-header hdr-vacation">Vacation &amp; Non-Clinical</div><div class="section-body">';
  if(vac&&vac.length>0){
    html+='<div class="vac-grid">';
    vac.forEach(function(n){ if(n&&n.trim()) html+='<div class="vac-chip">'+esc(n.trim())+'</div>'; });
    html+='</div>';
  } else { html+='<div class="empty-section">No vacation / non-clinical assignments</div>'; }
  html+='</div></div></div>';
  display.innerHTML=html;
}

function supBadge(role,name,cls){
  var n=(name||'').trim();
  return '<div class="supervisor-badge '+cls+'"><span class="role">'+role+'</span><span class="name">'+(n?esc(n):'&mdash;')+'</span></div>';
}
function roleRow(label,name){
  var n=(name||'').trim();
  return '<div class="role-item"><span class="role-label">'+label+'</span><span class="role-name'+(n?'':' empty')+'">'+(n?esc(n):'&mdash;')+'</span></div>';
}

(function init(){
  var keys=Object.keys(scheduleData).sort();
  var today=getToday();
  var target=keys[0];
  for(var i=0;i<keys.length;i++){ if(keys[i]>=today){ target=keys[i]; break; } }
  selectDate(target);
})();

</script>
